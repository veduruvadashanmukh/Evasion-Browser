<!DOCTYPE html>

<header class="browser-toolbar">
<section class="tab-bar">
<div class="browser-brand">
<img class="browser-logo" src="assets/branding/evasion-mark-64.png" alt="Evasion Browser">
</div>
<button aria-label="Scroll tabs left" class="tab-scroll-button" hidden="" id="scrollTabsLeftButton" title="Scroll tabs left" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-chevron-left"></use></svg></button>
<div aria-label="Browser tabs" class="tabs-container" id="tabsContainer" role="tablist"></div>
<button aria-label="Scroll tabs right" class="tab-scroll-button" hidden="" id="scrollTabsRightButton" title="Scroll tabs right" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-chevron-right"></use></svg></button>
<button aria-label="Create a new tab" class="new-tab-button" id="newTabButton" title="New tab" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-plus"></use></svg></button>
<button aria-controls="tabActionsMenu" aria-expanded="false" aria-label="Open tab actions" class="tab-actions-button" id="tabActionsButton" title="Tab actions" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-chevron-down"></use></svg></button>
</section>
<section class="navigation-row">
<button aria-label="Go back" class="navigation-button" disabled="" id="backButton" title="Back" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-back"></use></svg></button>
<button aria-label="Go forward" class="navigation-button" disabled="" id="forwardButton" title="Forward" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-forward"></use></svg></button>
<button aria-label="Reload page" class="navigation-button" id="reloadButton" title="Reload" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-reload"></use></svg></button>
<button aria-label="Open homepage" class="navigation-button" id="homeButton" title="Home" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-home"></use></svg></button>
<form class="address-form" id="addressForm">
<span class="security-icon" id="securityIcon" title="Website information"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-globe"></use></svg></span>
<input aria-label="Website address" autocomplete="off" class="address-bar" id="addressBar" placeholder="Search the web or enter an address" spellcheck="false" type="text"/>
<button class="go-button" id="goButton" title="Open address" type="submit">
                    Go
                </button>
</form>
<button aria-label="Bookmark this page" class="navigation-button" id="bookmarkButton" title="Bookmark this page" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-star"></use></svg></button>
<button aria-controls="browserMenu" aria-expanded="false" aria-label="Open browser menu" class="navigation-button" id="menuButton" title="Browser menu" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-menu"></use></svg></button>
</section>
<div class="loading-bar" id="loadingBar"></div>
</header>
<div class="menu-overlay" hidden="" id="menuOverlay"></div>
<aside aria-label="Browser menu" class="browser-menu" hidden="" id="browserMenu">
<div class="menu-header">
<button class="menu-profile" id="profileMenuButton" type="button" title="Open profile settings">
<div class="menu-profile-avatar" id="menuProfileAvatar">E</div>
<div class="menu-profile-text">
<strong id="menuProfileName">Evasion Browser</strong>
<span id="menuProfileEmail">Local profile</span>
</div>
</button>
</div>
<div class="menu-divider"></div>
<button class="menu-item" id="newTabMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-plus"></use></svg></span>
<span class="menu-label">New tab</span>
<span class="menu-shortcut">Ctrl+T</span>
</button>
<button class="menu-item" id="newWindowMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-window"></use></svg></span>
<span class="menu-label">New window</span>
<span class="menu-shortcut">Ctrl+N</span>
</button>
<button class="menu-item" id="newIncognitoMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-incognito"></use></svg></span>
<span class="menu-label">
                New incognito window
            </span>
<span class="menu-shortcut">
                Ctrl+Shift+N
            </span>
</button>
<div class="menu-divider"></div>
<button class="menu-item" id="passwordsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-key"></use></svg></span>
<span class="menu-label">
                Passwords and autofill
            </span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="historyMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-history"></use></svg></span>
<span class="menu-label">History</span>
<span class="menu-shortcut">Ctrl+H</span>
</button>
<button class="menu-item" id="downloadsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-download"></use></svg></span>
<span class="menu-label">Downloads</span>
<span class="menu-shortcut">Ctrl+J</span>
</button>
<button class="menu-item" id="bookmarksMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-star"></use></svg></span>
<span class="menu-label">Bookmarks</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="tabGroupsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-grid"></use></svg></span>
<span class="menu-label">Tab groups</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="gamingMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-bolt"></use></svg></span>
<span class="menu-label">Evasion Control</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="securityMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-shield"></use></svg></span>
<span class="menu-label">Z+ Security Center</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="extensionsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-puzzle"></use></svg></span>
<span class="menu-label">Extensions</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="clearDataMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-trash"></use></svg></span>
<span class="menu-label">
                Delete browsing data
            </span>
<span class="menu-shortcut">
                Ctrl+Shift+Del
            </span>
</button>
<div class="menu-divider"></div>
<div class="zoom-row">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-search"></use></svg></span>
<span class="zoom-label">
                Zoom
            </span>
<div class="zoom-controls">
<button aria-label="Zoom out" class="zoom-button" id="zoomOutButton" title="Zoom out" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-zoom"></use></svg></button>
<button class="zoom-value" id="zoomResetButton" title="Reset zoom" type="button">
<span id="zoomValue">100%</span>
</button>
<button aria-label="Zoom in" class="zoom-button" id="zoomInButton" title="Zoom in" type="button">
                    +
                </button>
<button aria-label="Toggle full screen" class="zoom-button" id="fullScreenButton" title="Full screen" type="button"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-fullscreen"></use></svg></button>
</div>
</div>
<div class="menu-divider"></div>
<button class="menu-item" id="printMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-print"></use></svg></span>
<span class="menu-label">Print</span>
<span class="menu-shortcut">Ctrl+P</span>
</button>
<button class="menu-item" id="savePdfMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-file-down"></use></svg></span>
<span class="menu-label">
                Save page as PDF
            </span>
</button>
<button class="menu-item" id="findMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-search"></use></svg></span>
<span class="menu-label">Find on page</span>
<span class="menu-shortcut">Ctrl+F</span>
</button>
<button class="menu-item" id="shareMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-share"></use></svg></span>
<span class="menu-label">Share</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="evolutionMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-bolt"></use></svg></span>
<span class="menu-label">Evasion 3.0 Center</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="advancedMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-grid"></use></svg></span>
<span class="menu-label">Evasion Nexus</span>
<span class="menu-shortcut">Ctrl+Shift+P</span>
</button>
<button class="menu-item" id="moreToolsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-tools"></use></svg></span>
<span class="menu-label">More tools</span>
<span class="menu-arrow">›</span>
</button>
<div class="menu-divider"></div>
<button class="menu-item" id="helpMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-help"></use></svg></span>
<span class="menu-label">Help</span>
<span class="menu-arrow">›</span>
</button>
<button class="menu-item" id="settingsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-settings"></use></svg></span>
<span class="menu-label">Settings</span>
</button>
<button class="menu-item" id="developerToolsMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-code"></use></svg></span>
<span class="menu-label">
                Developer tools
            </span>
<span class="menu-shortcut">F12</span>
</button>
<button class="menu-item danger-item" id="exitMenuItem" type="button">
<span class="menu-icon"><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-exit"></use></svg></span>
<span class="menu-label">Exit</span>
</button>
</aside>
<aside aria-label="Tab menu" class="tab-context-menu" hidden="" id="tabContextMenu">
<button class="context-menu-item" id="tabContextNewButton" type="button">
<span>New tab</span>
<span class="context-shortcut">Ctrl+T</span>
</button>
<button class="context-menu-item" id="tabContextReloadButton" type="button">
<span>Reload</span>
<span class="context-shortcut">Ctrl+R</span>
</button>
<button class="context-menu-item" id="tabContextDuplicateButton" type="button">
<span>Duplicate tab</span>
</button>
<div class="context-menu-divider"></div>
<button class="context-menu-item" id="tabContextCloseButton" type="button">
<span>Close tab</span>
<span class="context-shortcut">Ctrl+W</span>
</button>
<button class="context-menu-item" id="tabContextCloseOthersButton" type="button">
<span>Close other tabs</span>
</button>
<button class="context-menu-item" id="tabContextCloseRightButton" type="button">
<span>Close tabs to the right</span>
</button>
<div class="context-menu-divider"></div>
<button class="context-menu-item" id="tabContextReopenButton" type="button">
<span>Reopen closed tab</span>
<span class="context-shortcut">
                Ctrl+Shift+T
            </span>
</button>
</aside>
<aside aria-label="Tab actions" class="tab-actions-menu" hidden="" id="tabActionsMenu">
<button class="context-menu-item" id="tabActionsNewButton" type="button">
            New tab
        </button>
<button class="context-menu-item" id="tabActionsReopenButton" type="button">
            Reopen closed tab
        </button>
<button class="context-menu-item" id="tabActionsDuplicateButton" type="button">
            Duplicate current tab
        </button>
<div class="context-menu-divider"></div>
<div class="tab-list-heading">
            Open tabs
        </div>
<div class="open-tabs-list" id="openTabsList"></div>
</aside>
<section class="find-bar" hidden="" id="findBar">
<input autocomplete="off" class="find-input" id="findInput" placeholder="Find on page" spellcheck="false" type="text"/>
<span class="find-result-count" id="findResultCount">
            0/0
        </span>
<button class="find-button" id="findPreviousButton" title="Previous result" type="button">
            ↑
        </button>
<button class="find-button" id="findNextButton" title="Next result" type="button">
            ↓
        </button>
<button class="find-button" id="findCloseButton" title="Close find bar" type="button">
            ×
        </button>
</section>
<template id="tabTemplate">
<button aria-selected="false" class="browser-tab" draggable="true" role="tab" type="button">
<span aria-hidden="true" class="tab-favicon">
                🌐
            </span>
<span class="tab-title">
                New Tab
            </span>
<span aria-hidden="true" class="tab-loading-indicator" hidden=""></span>
<span aria-hidden="true" class="tab-audio-indicator" hidden=""><svg aria-hidden="true" class="ui-icon" focusable="false"><use href="#icon-volume"></use></svg></span>
<span aria-label="Close tab" class="tab-close-button" role="button" title="Close tab">
                ×
            </span>
</button>
</template>
<template id="openTabListItemTemplate">
<button class="open-tab-list-item" type="button">
<span class="open-tab-favicon">
                🌐
            </span>
<span class="open-tab-title">
                New Tab
            </span>
<span class="open-tab-close">
                ×
            </span>
</button>
</template>
<script src="renderer.js"></script>
</body>
</html>
